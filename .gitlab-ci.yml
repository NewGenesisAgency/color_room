stages:
  - pretest
  - test
  - build
  - deploy

# 1. PRETEST : Vérification de la qualité du code (Linting)
pretest_job:
  stage: pretest
  tags:
    - raspberry
  only:
    - ux-app
  script:
    - echo "Vérification de la syntaxe et du formatage du code..."
    # - insérer ici ta commande de linter (ex: npm run lint, flake8, etc.)

# 2. TEST : Lancement des tests unitaires
test_job:
  stage: test
  tags:
    - raspberry
  only:
    - ux-app
  script:
    - echo "Lancement des tests automatisés..."
    # - insérer ici ta commande de test (ex: npm test, pytest, dotnet test, etc.)

# 3. BUILD : Copie des fichiers et construction des images Docker
build_job:
  stage: build
  tags:
    - raspberry
  only:
    - ux-app
  script:
    - echo "Création du dossier cible s'il n'existe pas..."
    - mkdir -p /home/maxime/color-room/ux-app
    - echo "Copie des fichiers téléchargés par GitLab vers ton dossier..."
    - cp -r . /home/maxime/color-room/ux-app/
    - echo "Construction des images Docker depuis ton dossier..."
    - cd /home/maxime/color-room/ux-app
    - docker compose build

# 4. DEPLOY : Lancement de l'application
deploy_job:
  stage: deploy
  tags:
    - raspberry
  only:
    - ux-app
  script:
    - echo "Début du déploiement sur le Raspberry Pi..."
    - cd /home/maxime/color-room/ux-app
    - docker compose down --remove-orphans
    # On lance les conteneurs (ils utiliseront l'image fraîchement créée à l'étape "build")
    - docker compose up -d
    - echo "Déploiement terminé - App disponible sur le port configuré !"