services:
  color-room:
    build:
      context: ./app
    container_name: color-room
    ports:
      - "8080:3000"
    environment:
      - COLOR_ROOM_PORT=3000
      - COLOR_ROOM_DB_PATH=/data/ColorRoomDB.db
    volumes:
      - ./app/data:/data
    restart: unless-stopped
    healthcheck:
      # Check via node (fetch intégré à Node 20) — l'image n'embarque plus curl.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
      - "9443:9443"

volumes:
  portainer_data:
