services:
  color-room:
    build:
      context: ./app
    container_name: color-room
    ports:
      - "8080:3000"
    environment:
      - COLOR_ROOM_PORT=3000
      - COLOR_ROOM_DB_PATH=/data/ColorRoomDB.db
    volumes:
      # On monte le DOSSIER contenant la base (et ses fichiers -wal / -shm du mode WAL),
      # pas un fichier unique : un bind-mount de fichier absent crée un dossier vide et
      # casse l'ouverture SQLite. Le dossier ./app/data contient la base réelle.
      # Pour partager la base avec SupervisionAPI (.NET), remplacer par : ../SupervisionAPI/data:/data
      - ./app/data:/data
    restart: unless-stopped
    healthcheck:
      # Check via node (fetch intégré à Node 20) — l'image n'embarque plus curl.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Permet Ã  Portainer de piloter Docker
      - portainer_data:/data                       # Persistance des rÃ©glages Portainer
    ports:
      - "9000:9000"  # Interface HTTP (optionnel)
      - "9443:9443"  # Interface HTTPS (recommandÃ©)

volumes:
  portainer_data:
